<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Issue Tracter</title>
  <link rel="stylesheet" href="it.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="logo">AHM</div>
      <h1 class="page-title">ISSUE TRACTER</h1>

      <div class="top-right">
        <button id="addBtn" class="add-btn" title="Tambah issue">+</button>
      </div>
    </header>

    <section class="filter-panel">
      <div class="filter-label">
        <span class="filter-icon">⌁</span>
        <span>FILTER</span>
      </div>

      <div class="filter-controls">
        <div class="filter-group filter-search">
          <label for="searchInput">Search</label>
          <input
            type="text"
            id="searchInput"
            placeholder="Cari bagian, deskripsi, user, status, note..."
          />
        </div>

        <div class="filter-group">
          <label for="filterBagian">Bagian</label>
          <select id="filterBagian">
            <option value="">Semua</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filterStatus">Status</label>
          <select id="filterStatus">
            <option value="">Semua</option>
            <option value="OPEN">Open</option>
            <option value="CLOSE">Close</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filterTanggal">Tanggal</label>
          <input type="text" id="filterTanggal" placeholder="Contoh: 3/11/2026" />
        </div>

        <div class="filter-actions">
          <button id="resetFilterBtn" type="button" class="reset-filter-btn">Reset</button>
        </div>
      </div>
    </section>

    <main class="content">
      <section class="table-section">
        <div class="table-header">
          <div>TANGGAL</div>
          <div>BAGIAN</div>
          <div>DESKRIPSI KENDALA</div>
          <div>LAMPIRAN</div>
          <div>USER</div>
          <div>STATUS</div>
          <div>NOTE</div>
          <div>AKSI</div>
        </div>

        <div id="tableBody" class="table-body"></div>
      </section>

      <div class="bottom-actions">
        <button id="backBtn" class="back-btn">&#8592;</button>
      </div>
    </main>
  </div>

  <!-- Modal tambah / edit issue -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Tambah Issue</h2>
        <button id="closeModalBtn" class="close-modal" type="button">&times;</button>
      </div>

      <form id="issueForm">
        <input type="hidden" id="editIndex" />

        <div class="form-grid">
          <div class="form-group">
            <label for="tanggal">Tanggal</label>
            <input type="text" id="tanggal" placeholder="3/11/2026" required />
          </div>

          <div class="form-group">
            <label for="bagian">Bagian</label>
            <input type="text" id="bagian" required />
          </div>

          <div class="form-group full">
            <label for="deskripsi">Deskripsi Kendala</label>
            <textarea id="deskripsi" rows="4" required></textarea>
          </div>

          <div class="form-group">
            <label for="lampiran">Lampiran</label>
            <input type="text" id="lampiran" placeholder="contoh: -, file.pdf" />
          </div>

          <div class="form-group">
            <label for="userName">Nama User</label>
            <input type="text" id="userName" required />
          </div>

          <div class="form-group">
            <label for="userEmail">Email User</label>
            <input type="email" id="userEmail" required />
          </div>

          <div class="form-group">
            <label for="userId">No ID User</label>
            <input type="text" id="userId" required />
          </div>

          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" required>
              <option value="OPEN">Open</option>
              <option value="CLOSE">Close</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="note">Note</label>
            <textarea id="note" rows="3"></textarea>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="btn btn-secondary">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal detail user -->
  <div id="userModalOverlay" class="modal-overlay hidden">
    <div class="user-modal">
      <div class="modal-header">
        <h2>Detail User</h2>
        <button id="closeUserModalBtn" class="close-modal" type="button">&times;</button>
      </div>

      <div class="user-card">
        <div class="user-avatar-large">👤</div>
        <div class="user-info-list">
          <div class="user-info-item">
            <span class="label">Nama</span>
            <span id="detailUserName" class="value">-</span>
          </div>
          <div class="user-info-item">
            <span class="label">Email</span>
            <span id="detailUserEmail" class="value">-</span>
          </div>
          <div class="user-info-item">
            <span class="label">No ID</span>
            <span id="detailUserId" class="value">-</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="it.js"></script>
</body>
</html>
